name: Build iSCSI Console

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows package
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: msbuild ISCSIConsole/ISCSIConsole.csproj /t:Restore /p:Configuration=Release /p:TargetFramework=net472

      - name: Build
        run: >
          msbuild ISCSIConsole/ISCSIConsole.csproj
          /p:Configuration=Release
          /p:TargetFramework=net472
          /p:SkipILMerge=true
          /p:SkipILRepack=true

      - name: Collect files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts/iSCSIConsole-net472 -Force | Out-Null
          Copy-Item -Path ISCSIConsole/bin/Release/net472/* -Destination artifacts/iSCSIConsole-net472/ -Recurse

      - name: Copy license and readme
        shell: pwsh
        run: |
          Copy-Item -LiteralPath License.txt -Destination artifacts/iSCSIConsole-net472/
          Copy-Item -LiteralPath Readme.md -Destination artifacts/iSCSIConsole-net472/

      - name: Create archive
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/iSCSIConsole-net472/* -DestinationPath artifacts/iSCSIConsole-net472.zip -Force

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: iSCSIConsole-net472
          path: artifacts/iSCSIConsole-net472.zip
          if-no-files-found: error

      - name: Publish public latest release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: latest
          RELEASE_NAME: Latest iSCSI Console build
          ASSET_NAME: iSCSIConsole-net472.zip
          ASSET_PATH: artifacts/iSCSIConsole-net472.zip
        run: |
          $ErrorActionPreference = 'Stop'
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            'X-GitHub-Api-Version' = '2022-11-28'
          }
          $apiBase = "https://api.github.com/repos/$env:REPO"

          $tagRefUri = "$apiBase/git/refs/tags/$env:RELEASE_TAG"
          try {
            Invoke-RestMethod -Method Patch -Uri $tagRefUri -Headers $headers -ContentType 'application/json' -Body (@{
              sha = $env:GITHUB_SHA
              force = $true
            } | ConvertTo-Json)
          } catch {
            if ($_.Exception.Response -and [int]$_.Exception.Response.StatusCode -eq 404) {
              Invoke-RestMethod -Method Post -Uri "$apiBase/git/refs" -Headers $headers -ContentType 'application/json' -Body (@{
                ref = "refs/tags/$env:RELEASE_TAG"
                sha = $env:GITHUB_SHA
              } | ConvertTo-Json)
            } else {
              throw
            }
          }

          $releaseBody = @{
            tag_name = $env:RELEASE_TAG
            target_commitish = $env:GITHUB_SHA
            name = $env:RELEASE_NAME
            body = "Public Windows build generated from commit $env:GITHUB_SHA."
            draft = $false
            prerelease = $false
            make_latest = 'true'
          }

          try {
            $release = Invoke-RestMethod -Method Get -Uri "$apiBase/releases/tags/$env:RELEASE_TAG" -Headers $headers
            $release = Invoke-RestMethod -Method Patch -Uri "$apiBase/releases/$($release.id)" -Headers $headers -ContentType 'application/json' -Body ($releaseBody | ConvertTo-Json)
          } catch {
            if ($_.Exception.Response -and [int]$_.Exception.Response.StatusCode -eq 404) {
              $release = Invoke-RestMethod -Method Post -Uri "$apiBase/releases" -Headers $headers -ContentType 'application/json' -Body ($releaseBody | ConvertTo-Json)
            } else {
              throw
            }
          }

          $assets = Invoke-RestMethod -Method Get -Uri "$apiBase/releases/$($release.id)/assets" -Headers $headers
          foreach ($asset in $assets) {
            if ($asset.name -eq $env:ASSET_NAME) {
              Invoke-RestMethod -Method Delete -Uri "$apiBase/releases/assets/$($asset.id)" -Headers $headers
            }
          }

          $assetName = [System.Uri]::EscapeDataString($env:ASSET_NAME)
          $uploadUri = "https://uploads.github.com/repos/$env:REPO/releases/$($release.id)/assets?name=$assetName"
          Invoke-RestMethod -Method Post -Uri $uploadUri -Headers $headers -ContentType 'application/zip' -InFile $env:ASSET_PATH

          Write-Host "Public download: https://github.com/$env:REPO/releases/download/$env:RELEASE_TAG/$env:ASSET_NAME"
