name: Build iSCSI Console

on:
  push:
    branches:
      - master
      - 'codex/**'
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows package
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install ILMerge
        run: nuget install ILMerge -Version 3.0.41 -OutputDirectory tools

      - name: Restore
        run: msbuild ISCSIConsole/ISCSIConsole.csproj /t:Restore /p:Configuration=Release /p:TargetFramework=net472 /p:SkipILRepack=true

      - name: Build
        run: >
          msbuild ISCSIConsole/ISCSIConsole.csproj
          /p:Configuration=Release
          /p:TargetFramework=net472
          /p:SkipILMerge=true
          /p:SkipILRepack=true

      - name: Merge single executable
        shell: pwsh
        run: |
          & ISCSIConsole/ILMerge/ILMerge.bat net472
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "ILMerge failed. The package will fall back to the normal exe/dll layout."
            exit 0
          }

      - name: Collect files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts/iSCSIConsole-net472 -Force | Out-Null
          $mergedExe = "ISCSIConsole/bin/ILMerge/net472/ISCSIConsole.exe"
          if (Test-Path $mergedExe) {
            Copy-Item -LiteralPath $mergedExe -Destination artifacts/iSCSIConsole-net472/
          } else {
            Copy-Item -Path ISCSIConsole/bin/Release/net472/*.exe -Destination artifacts/iSCSIConsole-net472/
            Copy-Item -Path ISCSIConsole/bin/Release/net472/*.dll -Destination artifacts/iSCSIConsole-net472/
            Copy-Item -Path ISCSIConsole/bin/Release/net472/*.config -Destination artifacts/iSCSIConsole-net472/ -ErrorAction SilentlyContinue
          }

      - name: Copy license and readme
        shell: pwsh
        run: |
          Copy-Item -LiteralPath License.txt -Destination artifacts/iSCSIConsole-net472/
          Copy-Item -LiteralPath Readme.md -Destination artifacts/iSCSIConsole-net472/

      - name: Create archive
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/iSCSIConsole-net472/* -DestinationPath artifacts/iSCSIConsole-net472.zip -Force

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: iSCSIConsole-net472
          path: artifacts/iSCSIConsole-net472.zip
          if-no-files-found: error

      - name: Update latest tag
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        shell: pwsh
        run: |
          git tag -f latest $env:GITHUB_SHA
          git push origin refs/tags/latest --force

      - name: Publish public latest release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: Latest iSCSI Console build
          body: Public Windows build generated from commit ${{ github.sha }}.
          files: artifacts/iSCSIConsole-net472.zip
          overwrite_files: true
          make_latest: true
